name: Deploy Home Server

on:
    workflow_run:
        workflows:
            - Publish Image
        types:
            - completed
        branches:
            - main
    workflow_dispatch:
        inputs:
            tag:
                description: Image tag to deploy
                required: false
                default: latest
            branch:
                description: Git branch to pull on the home server
                required: false
                default: main

permissions:
    contents: read

jobs:
    deploy:
        name: Pull image and roll app containers
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment: production
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

        steps:
            - name: Prepare SSH key
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
              run: |
                  test -n "$DEPLOY_SSH_KEY"
                  test -n "$DEPLOY_KNOWN_HOSTS"
                  install -m 700 -d ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
                  printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

            - name: Deploy with Docker Compose
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                  HOST_PORT: ${{ vars.HOST_PORT }}
                  POSTGRES_DB: ${{ vars.POSTGRES_DB || secrets.POSTGRES_DB || 'kice_arena' }}
                  POSTGRES_USER: ${{ vars.POSTGRES_USER || secrets.POSTGRES_USER || 'kice_arena' }}
                  POSTGRES_HOST_PORT: ${{ vars.POSTGRES_HOST_PORT }}
                  REDIS_HOST_PORT: ${{ vars.REDIS_HOST_PORT }}
                  POSTGRES_EXPORTER_HOST_PORT: ${{ vars.POSTGRES_EXPORTER_HOST_PORT }}
                  REDIS_EXPORTER_HOST_PORT: ${{ vars.REDIS_EXPORTER_HOST_PORT }}
                  PROMETHEUS_HOST_PORT: ${{ vars.PROMETHEUS_HOST_PORT }}
                  ALERTMANAGER_HOST_PORT: ${{ vars.ALERTMANAGER_HOST_PORT }}
                  GRAFANA_HOST_PORT: ${{ vars.GRAFANA_HOST_PORT }}
                  GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER }}
                  CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
                  CAMPAIGN_REFERRAL_WHITELIST: ${{ vars.CAMPAIGN_REFERRAL_WHITELIST }}
                  CAMPAIGN_LOCATION_RADIUS_KM: ${{ vars.CAMPAIGN_LOCATION_RADIUS_KM }}
                  REDIS_URL: ${{ vars.REDIS_URL || secrets.REDIS_URL }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
                  CAMPAIGN_AUTH_SECRET: ${{ secrets.CAMPAIGN_AUTH_SECRET }}
                  ADMIN_BASIC_AUTH_HTPASSWD: ${{ secrets.ADMIN_BASIC_AUTH_HTPASSWD }}
                  METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
                  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'latest' }}
                  BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event.workflow_run.head_branch }}
              run: |
                  set -euo pipefail
                  require_env() {
                    local key="$1"
                    local value="$2"
                    if [ -z "$value" ]; then
                      echo "Missing required GitHub deploy setting: $key" >&2
                      exit 1
                    fi
                  }

                  require_env DEPLOY_HOST "$DEPLOY_HOST"
                  require_env DEPLOY_USER "$DEPLOY_USER"
                  require_env DEPLOY_PATH "$DEPLOY_PATH"
                  require_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
                  require_env ADMIN_TOKEN "${ADMIN_TOKEN:-}"
                  require_env CAMPAIGN_AUTH_SECRET "${CAMPAIGN_AUTH_SECRET:-}"
                  require_env ADMIN_BASIC_AUTH_HTPASSWD "${ADMIN_BASIC_AUTH_HTPASSWD:-}"
                  require_env METRICS_BEARER_TOKEN "${METRICS_BEARER_TOKEN:-}"
                  require_env GRAFANA_ADMIN_PASSWORD "${GRAFANA_ADMIN_PASSWORD:-}"

                  case "$TAG" in
                    *[!A-Za-z0-9._-]* | "") echo "Invalid image tag: $TAG" >&2; exit 1 ;;
                  esac

                  case "$BRANCH" in
                    *[!A-Za-z0-9._/-]* | "" | -* | */../* | ../* | */..) echo "Invalid branch: $BRANCH" >&2; exit 1 ;;
                  esac

                  Q_DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH")
                  Q_BRANCH=$(printf '%q' "$BRANCH")
                  Q_TAG=$(printf '%q' "$TAG")

                  ENV_FILE="$(mktemp)"
                  METRICS_TOKEN_FILE="$(mktemp)"
                  ADMIN_BASIC_AUTH_FILE="$(mktemp)"
                  add_env() {
                    local key="$1"
                    local value="$2"
                    if [ -n "$value" ]; then
                      value="${value//\\/\\\\}"
                      value="${value//\"/\\\"}"
                      value="${value//\$/\\\$}"
                      value="${value//\`/\\\`}"
                      printf '%s="%s"\n' "$key" "$value" >> "$ENV_FILE"
                    fi
                  }

                  add_env HOST_PORT "${HOST_PORT:-}"
                  add_env POSTGRES_DB "${POSTGRES_DB:-}"
                  add_env POSTGRES_USER "${POSTGRES_USER:-}"
                  add_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
                  add_env POSTGRES_HOST_PORT "${POSTGRES_HOST_PORT:-}"
                  add_env REDIS_HOST_PORT "${REDIS_HOST_PORT:-}"
                  add_env POSTGRES_EXPORTER_HOST_PORT "${POSTGRES_EXPORTER_HOST_PORT:-}"
                  add_env REDIS_EXPORTER_HOST_PORT "${REDIS_EXPORTER_HOST_PORT:-}"
                  add_env DATABASE_URL "${DATABASE_URL:-}"
                  add_env REDIS_URL "${REDIS_URL:-}"
                  add_env ADMIN_TOKEN "${ADMIN_TOKEN:-}"
                  add_env CAMPAIGN_AUTH_SECRET "${CAMPAIGN_AUTH_SECRET:-}"
                  add_env ADMIN_BASIC_AUTH_FILE ./secrets/kice-admin.htpasswd
                  add_env CORS_ORIGINS "${CORS_ORIGINS:-}"
                  add_env CAMPAIGN_REFERRAL_WHITELIST "${CAMPAIGN_REFERRAL_WHITELIST:-}"
                  add_env CAMPAIGN_LOCATION_RADIUS_KM "${CAMPAIGN_LOCATION_RADIUS_KM:-}"
                  add_env PROMETHEUS_HOST_PORT "${PROMETHEUS_HOST_PORT:-}"
                  add_env ALERTMANAGER_HOST_PORT "${ALERTMANAGER_HOST_PORT:-}"
                  add_env GRAFANA_HOST_PORT "${GRAFANA_HOST_PORT:-}"
                  add_env GRAFANA_ADMIN_USER "${GRAFANA_ADMIN_USER:-}"
                  add_env GRAFANA_ADMIN_PASSWORD "${GRAFANA_ADMIN_PASSWORD:-}"
                  add_env DISCORD_WEBHOOK_URL "${DISCORD_WEBHOOK_URL:-}"
                  if [ -n "${METRICS_BEARER_TOKEN:-}" ]; then
                    add_env METRICS_TOKEN_FILE ./secrets/kice-arena-metrics-token
                    printf '%s' "$METRICS_BEARER_TOKEN" > "$METRICS_TOKEN_FILE"
                  fi
                  printf '%s\n' "$ADMIN_BASIC_AUTH_HTPASSWD" > "$ADMIN_BASIC_AUTH_FILE"

                  ssh \
                    -i ~/.ssh/deploy_key \
                    -p 222 \
                    -o IdentitiesOnly=yes \
                    -o PreferredAuthentications=publickey \
                    -o PasswordAuthentication=no \
                    -o StrictHostKeyChecking=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    "cat > $Q_DEPLOY_PATH/.env" < "$ENV_FILE"

                  if [ -n "${METRICS_BEARER_TOKEN:-}" ]; then
                    ssh \
                      -i ~/.ssh/deploy_key \
                      -p 222 \
                      -o IdentitiesOnly=yes \
                      -o PreferredAuthentications=publickey \
                      -o PasswordAuthentication=no \
                      -o StrictHostKeyChecking=yes \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      "mkdir -p $Q_DEPLOY_PATH/secrets && cat > $Q_DEPLOY_PATH/secrets/kice-arena-metrics-token && chmod 600 $Q_DEPLOY_PATH/secrets/kice-arena-metrics-token" < "$METRICS_TOKEN_FILE"
                  fi

                  ssh \
                    -i ~/.ssh/deploy_key \
                    -p 222 \
                    -o IdentitiesOnly=yes \
                    -o PreferredAuthentications=publickey \
                    -o PasswordAuthentication=no \
                    -o StrictHostKeyChecking=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    "mkdir -p $Q_DEPLOY_PATH/secrets && cat > $Q_DEPLOY_PATH/secrets/kice-admin.htpasswd && chmod 600 $Q_DEPLOY_PATH/secrets/kice-admin.htpasswd" < "$ADMIN_BASIC_AUTH_FILE"

                  ssh \
                      -i ~/.ssh/deploy_key \
                      -p 222 \
                      -o IdentitiesOnly=yes \
                      -o PreferredAuthentications=publickey \
                      -o PasswordAuthentication=no \
                      -o StrictHostKeyChecking=yes \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      "bash -s -- $Q_DEPLOY_PATH $Q_BRANCH $Q_TAG" <<'REMOTE'
                  set -euo pipefail

                  DEPLOY_PATH="$1"
                  BRANCH="$2"
                  TAG="$3"

                  export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

                  if command -v colima >/dev/null 2>&1; then
                    colima status >/dev/null 2>&1 || colima start
                    export DOCKER_HOST="unix://${HOME}/.colima/default/docker.sock"
                  fi

                  DOCKER="$(command -v docker)"

                  cd "$DEPLOY_PATH"

                  git fetch --prune origin
                  git checkout "$BRANCH"
                  git pull --ff-only origin "$BRANCH"

                  compose() {
                    TAG="$TAG" "$DOCKER" compose "$@"
                  }

                  wait_healthy() {
                    local service="$1"
                    local container_id=""
                    local status=""
                    local attempt=1

                    while [ "$attempt" -le 36 ]; do
                      container_id="$(compose ps -q "$service" 2>/dev/null || true)"
                      if [ -n "$container_id" ]; then
                        status="$("$DOCKER" inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || true)"
                        if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                          return 0
                        fi
                      fi
                      sleep 5
                      attempt=$((attempt + 1))
                    done

                    echo "Service did not become healthy: $service (last status: ${status:-missing})" >&2
                    compose ps
                    compose logs --tail=200 "$service" || true
                    return 1
                  }

                  require_service_container() {
                    local service="$1"
                    local container_id=""
                    container_id="$(compose ps -q "$service" 2>/dev/null || true)"
                    if [ -z "$container_id" ]; then
                      echo "Required deploy service is missing: $service" >&2
                      compose ps -a
                      return 1
                    fi
                  }

                  remove_legacy_app_container() {
                    local legacy_ids=""
                    legacy_ids="$("$DOCKER" ps -aq --filter "name=^/kice-arena$" || true)"
                    if [ -n "$legacy_ids" ]; then
                      "$DOCKER" stop $legacy_ids >/dev/null 2>&1 || true
                      "$DOCKER" rm -f $legacy_ids
                    fi
                  }

                  run_seed() {
                    compose rm -f -s kice-arena-seed >/dev/null 2>&1 || true
                    if ! compose up --no-deps --force-recreate --abort-on-container-exit --exit-code-from kice-arena-seed kice-arena-seed; then
                      compose ps -a
                      compose logs --tail=200 kice-arena-seed postgres
                      exit 1
                    fi
                    compose rm -f -s kice-arena-seed >/dev/null 2>&1 || true
                  }

                  verify_deploy() {
                    require_service_container kice-arena-blue
                    require_service_container kice-arena-green
                    require_service_container kice-arena-gateway
                    wait_healthy kice-arena-blue
                    wait_healthy kice-arena-green
                    wait_healthy kice-arena-gateway
                  }

                  render_gateway_upstream() {
                    local blue_state="$1"
                    local green_state="$2"
                    local blue_down=""
                    local green_down=""

                    if [ "$blue_state" = "down" ]; then
                      blue_down=" down"
                    fi
                    if [ "$green_state" = "down" ]; then
                      green_down=" down"
                    fi

                    printf '%s\n' \
                      "upstream kice_arena_app {" \
                      "    server kice-arena-blue:3001 max_fails=2 fail_timeout=5s${blue_down};" \
                      "    server kice-arena-green:3001 max_fails=2 fail_timeout=5s${green_down};" \
                      "}"
                  }

                  set_gateway_upstream() {
                    local blue_state="$1"
                    local green_state="$2"
                    local gateway_id=""

                    gateway_id="$(compose ps -q kice-arena-gateway 2>/dev/null || true)"
                    if [ -z "$gateway_id" ]; then
                      echo "Cannot update gateway upstream before kice-arena-gateway exists." >&2
                      return 1
                    fi

                    render_gateway_upstream "$blue_state" "$green_state" |
                      "$DOCKER" exec -i "$gateway_id" sh -c 'cat > /etc/nginx/conf.d/upstream.conf && nginx -t && nginx -s reload'
                  }

                  roll_app() {
                    local service="$1"
                    local standby_service=""
                    local blue_state="up"
                    local green_state="up"

                    case "$service" in
                      kice-arena-blue)
                        standby_service="kice-arena-green"
                        blue_state="down"
                        ;;
                      kice-arena-green)
                        standby_service="kice-arena-blue"
                        green_state="down"
                        ;;
                      *) echo "Unknown app service for rolling deploy: $service" >&2; exit 1 ;;
                    esac

                    wait_healthy "$standby_service"
                    set_gateway_upstream "$blue_state" "$green_state"
                    wait_healthy kice-arena-gateway

                    if ! compose up -d --no-deps --force-recreate "$service"; then
                      compose ps
                      compose logs --tail=200 "$service" kice-arena-gateway
                      exit 1
                    fi
                    wait_healthy "$service"
                    set_gateway_upstream up up
                    wait_healthy kice-arena-gateway
                  }

                  compose pull

                  if ! compose up -d postgres redis postgres-exporter redis-exporter alertmanager-discord alertmanager; then
                    compose ps
                    compose logs --tail=200 postgres redis postgres-exporter redis-exporter alertmanager-discord alertmanager
                    exit 1
                  fi

                  run_seed

                  gateway_id="$(compose ps -q kice-arena-gateway 2>/dev/null || true)"

                  if [ -z "$gateway_id" ]; then
                    compose up -d --no-deps kice-arena-blue
                    wait_healthy kice-arena-blue
                    compose up -d --no-deps kice-arena-green
                    wait_healthy kice-arena-green

                    remove_legacy_app_container

                    compose up -d --no-deps kice-arena-gateway
                    wait_healthy kice-arena-gateway
                  else
                    wait_healthy kice-arena-gateway
                    roll_app kice-arena-blue
                    roll_app kice-arena-green
                  fi

                  if ! compose up -d --remove-orphans prometheus grafana; then
                    compose ps
                    compose logs --tail=200 kice-arena-blue kice-arena-green kice-arena-gateway prometheus grafana
                    exit 1
                  fi
                  verify_deploy
                  wait_healthy prometheus
                  wait_healthy grafana
                  REMOTE
