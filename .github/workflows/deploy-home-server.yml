name: Deploy Home Server

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Image tag to deploy
                required: false
                default: latest
            branch:
                description: Git branch to pull on the home server
                required: false
                default: main

permissions:
    contents: read

jobs:
    deploy:
        name: Pull image and restart compose
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment: production

        steps:
            - name: Prepare SSH key
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
              run: |
                  test -n "$DEPLOY_SSH_KEY"
                  test -n "$DEPLOY_KNOWN_HOSTS"
                  install -m 700 -d ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
                  printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

            - name: Deploy with Docker Compose
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                  TAG: ${{ inputs.tag }}
                  BRANCH: ${{ inputs.branch }}
              run: |
                  set -euo pipefail
                  test -n "$DEPLOY_HOST"
                  test -n "$DEPLOY_USER"
                  test -n "$DEPLOY_PATH"

                  case "$TAG" in
                    *[!A-Za-z0-9._-]* | "") echo "Invalid image tag: $TAG" >&2; exit 1 ;;
                  esac

                  case "$BRANCH" in
                    *[!A-Za-z0-9._/-]* | "" | -* | */../* | ../* | */..) echo "Invalid branch: $BRANCH" >&2; exit 1 ;;
                  esac

                  Q_DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH")
                  Q_BRANCH=$(printf '%q' "$BRANCH")
                  Q_TAG=$(printf '%q' "$TAG")

                  ssh \
                    -i ~/.ssh/deploy_key \
                    -p 222 \
                    -o IdentitiesOnly=yes \
                    -o PreferredAuthentications=publickey \
                    -o PasswordAuthentication=no \
                    -o StrictHostKeyChecking=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    "bash -s -- $Q_DEPLOY_PATH $Q_BRANCH $Q_TAG" <<'REMOTE'
                  set -euo pipefail

                  DEPLOY_PATH="$1"
                  BRANCH="$2"
                  TAG="$3"

                  export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

                  if command -v colima >/dev/null 2>&1; then
                    colima status >/dev/null 2>&1 || colima start
                    export DOCKER_HOST="unix://${HOME}/.colima/default/docker.sock"
                  fi

                  DOCKER="$(command -v docker)"

                  cd "$DEPLOY_PATH"

                  git fetch --prune origin
                  git checkout "$BRANCH"
                  git pull --ff-only origin "$BRANCH"

                  TAG="$TAG" "$DOCKER" compose pull
                  TAG="$TAG" "$DOCKER" compose up -d --remove-orphans
                  REMOTE
