name: Deploy Home Server

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            branch:
                description: Git branch to pull on the home server
                required: false
                default: main

permissions:
    contents: read

jobs:
    deploy:
        name: Deploy host Bun app
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment: production

        steps:
            - name: Prepare SSH key
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
              run: |
                  test -n "$DEPLOY_SSH_KEY"
                  test -n "$DEPLOY_KNOWN_HOSTS"
                  install -m 700 -d ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
                  printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

            - name: Deploy without Docker image
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                  HOST_PORT: ${{ vars.HOST_PORT }}
                  KICE_DOCKER_BACKEND: ${{ vars.KICE_DOCKER_BACKEND }}
                  POSTGRES_DB: ${{ vars.POSTGRES_DB || secrets.POSTGRES_DB || 'kice_arena' }}
                  POSTGRES_USER: ${{ vars.POSTGRES_USER || secrets.POSTGRES_USER || 'kice_arena' }}
                  POSTGRES_HOST_PORT: ${{ vars.POSTGRES_HOST_PORT }}
                  REDIS_HOST_PORT: ${{ vars.REDIS_HOST_PORT }}
                  CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
                  CAMPAIGN_REFERRAL_WHITELIST: ${{ vars.CAMPAIGN_REFERRAL_WHITELIST }}
                  CAMPAIGN_LOCATION_RADIUS_KM: ${{ vars.CAMPAIGN_LOCATION_RADIUS_KM }}
                  CAMPAIGN_EMAIL_VERIFICATION_WEBHOOK_URL: ${{ vars.CAMPAIGN_EMAIL_VERIFICATION_WEBHOOK_URL || secrets.CAMPAIGN_EMAIL_VERIFICATION_WEBHOOK_URL }}
                  REDIS_URL: ${{ vars.REDIS_URL || secrets.REDIS_URL }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
                  CAMPAIGN_AUTH_SECRET: ${{ secrets.CAMPAIGN_AUTH_SECRET }}
                  METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
                  BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
              run: |
                  set -euo pipefail

                  require_env() {
                    local key="$1"
                    local value="$2"
                    if [ -z "$value" ]; then
                      echo "Missing required GitHub deploy setting: $key" >&2
                      exit 1
                    fi
                  }

                  require_env DEPLOY_HOST "$DEPLOY_HOST"
                  require_env DEPLOY_USER "$DEPLOY_USER"
                  require_env DEPLOY_PATH "$DEPLOY_PATH"
                  require_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
                  require_env ADMIN_TOKEN "${ADMIN_TOKEN:-}"
                  require_env CAMPAIGN_AUTH_SECRET "${CAMPAIGN_AUTH_SECRET:-}"
                  require_env METRICS_BEARER_TOKEN "${METRICS_BEARER_TOKEN:-}"

                  case "$BRANCH" in
                    *[!A-Za-z0-9._/-]* | "" | -* | */../* | ../* | */..) echo "Invalid branch: $BRANCH" >&2; exit 1 ;;
                  esac

                  Q_DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH")
                  Q_BRANCH=$(printf '%q' "$BRANCH")

                  ENV_FILE="$(mktemp)"
                  add_env() {
                    local key="$1"
                    local value="$2"
                    if [ -n "$value" ]; then
                      value="${value//\\/\\\\}"
                      value="${value//\"/\\\"}"
                      value="${value//\$/\\\$}"
                      value="${value//\`/\\\`}"
                      printf '%s="%s"\n' "$key" "$value" >> "$ENV_FILE"
                    fi
                  }

                  add_env HOST_PORT "${HOST_PORT:-}"
                  add_env PORT "${HOST_PORT:-}"
                  add_env KICE_DOCKER_BACKEND "${KICE_DOCKER_BACKEND:-}"
                  add_env POSTGRES_DB "${POSTGRES_DB:-}"
                  add_env POSTGRES_USER "${POSTGRES_USER:-}"
                  add_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
                  add_env POSTGRES_HOST_PORT "${POSTGRES_HOST_PORT:-}"
                  add_env REDIS_HOST_PORT "${REDIS_HOST_PORT:-}"
                  add_env DATABASE_URL "${DATABASE_URL:-}"
                  add_env REDIS_URL "${REDIS_URL:-}"
                  add_env ADMIN_TOKEN "${ADMIN_TOKEN:-}"
                  add_env CAMPAIGN_AUTH_SECRET "${CAMPAIGN_AUTH_SECRET:-}"
                  add_env CAMPAIGN_EMAIL_VERIFICATION_WEBHOOK_URL "${CAMPAIGN_EMAIL_VERIFICATION_WEBHOOK_URL:-}"
                  add_env CORS_ORIGINS "${CORS_ORIGINS:-}"
                  add_env CAMPAIGN_REFERRAL_WHITELIST "${CAMPAIGN_REFERRAL_WHITELIST:-}"
                  add_env CAMPAIGN_LOCATION_RADIUS_KM "${CAMPAIGN_LOCATION_RADIUS_KM:-}"
                  add_env METRICS_BEARER_TOKEN "${METRICS_BEARER_TOKEN:-}"

                  ssh \
                    -i ~/.ssh/deploy_key \
                    -p 222 \
                    -o IdentitiesOnly=yes \
                    -o PreferredAuthentications=publickey \
                    -o PasswordAuthentication=no \
                    -o StrictHostKeyChecking=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    "mkdir -p $Q_DEPLOY_PATH && cat > $Q_DEPLOY_PATH/.env" < "$ENV_FILE"

                  ssh \
                    -i ~/.ssh/deploy_key \
                    -p 222 \
                    -o IdentitiesOnly=yes \
                    -o PreferredAuthentications=publickey \
                    -o PasswordAuthentication=no \
                    -o StrictHostKeyChecking=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    "cd $Q_DEPLOY_PATH && git fetch --prune origin && git checkout $Q_BRANCH && git pull --ff-only origin $Q_BRANCH && bash scripts/deploy-home-bun.sh"
