# Merge this job into the existing Prometheus scrape_configs on the server.
# Replace 10.0.0.10:3001 with the private host:port that reaches this app.
scrape_configs:
  - job_name: kice-arena
    metrics_path: /metrics
    scrape_interval: 5s
    authorization:
      type: Bearer
      credentials_file: /run/secrets/kice_arena_metrics_token
    static_configs:
      - targets:
          - 10.0.0.10:3001

  - job_name: postgres
    static_configs:
      - targets:
          - 10.0.0.10:9187

  - job_name: redis
    static_configs:
      - targets:
          - 10.0.0.10:9121
