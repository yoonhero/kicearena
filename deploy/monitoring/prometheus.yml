global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/kice-arena-prometheus-rules.yml

scrape_configs:
  - job_name: kice-arena
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/kice_arena_metrics_token
    static_configs:
      - targets:
          - kice-arena:3001
