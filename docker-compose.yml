services:
  kice-arena:
    image: ${IMAGE:-ghcr.io/yoonhero/kicearena}:${TAG:-latest}
    container_name: kice-arena
    environment:
      NODE_ENV: production
      PORT: 3001
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
      METRICS_BEARER_TOKEN_FILE: /run/secrets/kice_arena_metrics_token
    ports:
      - "127.0.0.1:${HOST_PORT:-3001}:3001"
    secrets:
      - kice_arena_metrics_token
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    secrets:
      - kice_arena_metrics_token
    depends_on:
      kice-arena:
        condition: service_healthy
      alertmanager:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:${ALERTMANAGER_HOST_PORT:-9093}
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"
    depends_on:
      alertmanager-discord:
        condition: service_started
    restart: unless-stopped

  alertmanager-discord:
    image: node:22-alpine
    container_name: alertmanager-discord
    working_dir: /app
    command: ["node", "/app/server.mjs"]
    environment:
      PORT: 9094
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./deploy/alertmanager-discord/server.mjs:/app/server.mjs:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

secrets:
  kice_arena_metrics_token:
    file: ${METRICS_TOKEN_FILE:-./deploy/monitoring/kice-arena-metrics-token.default}

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
