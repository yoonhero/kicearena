x-kice-arena-app: &kice-arena-app
    image: ghcr.io/yoonhero/kicearena:${TAG:-latest}
    command:
        [
            "sh",
            "-lc",
            "if command -v bun >/dev/null 2>&1; then bun run start; else npm run start; fi",
        ]
    environment:
        NODE_ENV: production
        PORT: 3001
        DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-kice_arena}:${POSTGRES_PASSWORD:-kice_arena}@postgres:5432/${POSTGRES_DB:-kice_arena}}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        ADMIN_TOKEN: ${ADMIN_TOKEN:-}
        CAMPAIGN_AUTH_SECRET: ${CAMPAIGN_AUTH_SECRET:-}
        CORS_ORIGINS: ${CORS_ORIGINS:-}
        CAMPAIGN_REFERRAL_WHITELIST: ${CAMPAIGN_REFERRAL_WHITELIST:-}
        CAMPAIGN_LOCATION_RADIUS_KM: ${CAMPAIGN_LOCATION_RADIUS_KM:-3}
        METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
        METRICS_BEARER_TOKEN_FILE: /run/secrets/kice_arena_metrics_token
    secrets:
        - kice_arena_metrics_token
    depends_on:
        postgres:
            condition: service_healthy
        redis:
            condition: service_healthy
    restart: unless-stopped
    healthcheck:
        test:
            [
                "CMD-SHELL",
                'if command -v bun >/dev/null 2>&1; then bun -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 3001) + ''/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; else node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 3001) + ''/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; fi',
            ]
        interval: 10s
        timeout: 5s
        start_period: 30s
        retries: 12

services:
    postgres:
        image: postgres:16-alpine
        container_name: kice-arena-postgres
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-kice_arena}
            POSTGRES_USER: ${POSTGRES_USER:-kice_arena}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kice_arena}
        ports:
            - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: kice-arena-redis
        command: redis-server --appendonly yes
        ports:
            - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    postgres-exporter:
        image: quay.io/prometheuscommunity/postgres-exporter:latest
        container_name: kice-arena-postgres-exporter
        environment:
            DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB:-kice_arena}?sslmode=disable
            DATA_SOURCE_USER: ${POSTGRES_USER:-kice_arena}
            DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-kice_arena}
        ports:
            - "127.0.0.1:${POSTGRES_EXPORTER_HOST_PORT:-9187}:9187"
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    redis-exporter:
        image: oliver006/redis_exporter:latest
        container_name: kice-arena-redis-exporter
        environment:
            REDIS_ADDR: ${REDIS_URL:-redis://redis:6379}
        ports:
            - "127.0.0.1:${REDIS_EXPORTER_HOST_PORT:-9121}:9121"
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped

    kice-arena-blue:
        <<: *kice-arena-app
        container_name: kice-arena-blue

    kice-arena-green:
        <<: *kice-arena-app
        container_name: kice-arena-green

    kice-arena-gateway:
        image: nginx:1.27-alpine
        container_name: kice-arena-gateway
        ports:
            - "127.0.0.1:${HOST_PORT:-3001}:3001"
        volumes:
            - ./deploy/nginx-app.conf:/etc/nginx/conf.d/default.conf:ro
            - ${ADMIN_BASIC_AUTH_FILE:-./secrets/kice-admin.htpasswd}:/etc/nginx/secrets/admin.htpasswd:ro
        depends_on:
            kice-arena-blue:
                condition: service_started
            kice-arena-green:
                condition: service_started
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/api/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 6

    kice-arena-seed:
        image: ghcr.io/yoonhero/kicearena:${TAG:-latest}
        container_name: kice-arena-seed
        environment:
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-kice_arena}:${POSTGRES_PASSWORD:-kice_arena}@postgres:5432/${POSTGRES_DB:-kice_arena}}
        command:
            [
                "sh",
                "-lc",
                "if command -v bun >/dev/null 2>&1; then bun run db:seed; else npm run db:seed; fi",
            ]
        depends_on:
            postgres:
                condition: service_healthy
        restart: "no"

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
        volumes:
            - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./deploy/monitoring/rules:/etc/prometheus/rules:ro
            - prometheus-data:/prometheus
        ports:
            - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
        secrets:
            - kice_arena_metrics_token
        depends_on:
            kice-arena-gateway:
                condition: service_healthy
            postgres-exporter:
                condition: service_started
            redis-exporter:
                condition: service_started
            alertmanager:
                condition: service_started
        restart: unless-stopped

    alertmanager:
        image: prom/alertmanager:latest
        container_name: alertmanager
        command:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.external-url=http://localhost:${ALERTMANAGER_HOST_PORT:-9093}
        volumes:
            - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
            - alertmanager-data:/alertmanager
        ports:
            - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"
        depends_on:
            alertmanager-discord:
                condition: service_started
        restart: unless-stopped

    alertmanager-discord:
        image: node:22-alpine
        container_name: alertmanager-discord
        working_dir: /app
        command: ["node", "/app/server.mjs"]
        environment:
            PORT: 9094
            DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
        volumes:
            - ./deploy/alertmanager-discord/server.mjs:/app/server.mjs:ro
        restart: unless-stopped

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
        volumes:
            - grafana-data:/var/lib/grafana
            - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
        ports:
            - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
        depends_on:
            - prometheus
        restart: unless-stopped

secrets:
    kice_arena_metrics_token:
        file: ${METRICS_TOKEN_FILE:-./deploy/monitoring/kice-arena-metrics-token.default}

volumes:
    postgres-data:
    redis-data:
    prometheus-data:
    alertmanager-data:
    grafana-data:
